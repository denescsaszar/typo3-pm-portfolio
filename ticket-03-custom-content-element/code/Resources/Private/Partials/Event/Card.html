<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<article class="event-card">
    <div class="event-card__date">
        <span class="event-card__day">
            <f:format.date date="{event.eventDate}" format="d" />
        </span>
        <span class="event-card__month">
            <f:format.date date="{event.eventDate}" format="M" />
        </span>
    </div>

    <div class="event-card__body">
        <span class="event-card__category badge badge--{event.category}">
            {event.categoryLabel}
        </span>
        <h3 class="event-card__title">
            <f:link.action action="show" arguments="{event: event}">
                {event.title}
            </f:link.action>
        </h3>
        <p class="event-card__location">
            <span aria-hidden="true">&#128205;</span> {event.location}
        </p>
        <p class="event-card__time">
            <span aria-hidden="true">&#128339;</span>
            <f:format.date date="{event.eventDate}" format="H:i" /> Uhr
        </p>
    </div>
</article>

</html>
